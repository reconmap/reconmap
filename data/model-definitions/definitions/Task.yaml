type: object
properties:
  id:
    type: integer
    nullable: true
  project_id:
    type: integer
  created_by_uid:
    type: integer
  assigned_to_uid:
    type: integer
    nullable: true
  created_at:
    type: string
  updated_at:
    type: string
    nullable: true
  priority:
    type: string
    enum:
    - highest
    - high
    - medium
    - low
    - lowest
  summary:
    type: string
  description:
    type: string
    nullable: true
  status:
    type: string
    enum:
    - todo
    - doing
    - done
    default: todo
  duration_estimate:
    type: integer
    nullable: true
  due_date:
    type: string
    nullable: true
required:
- project_id
- created_by_uid
- created_at
- priority
- summary
