type: object
properties:
  id:
    type: integer
    nullable: true
  created_at:
    type: string
  updated_at:
    type: string
    nullable: true
  created_by_uid:
    type: integer
  service_provider_id:
    type: integer
    nullable: true
  client_id:
    type: integer
    nullable: true
  name:
    type: string
  description:
    type: string
    nullable: true
  visibility:
    type: string
    enum:
    - public
    - private
    default: public
  is_template:
    type: boolean
    default: false
  category_id:
    type: integer
    nullable: true
  engagement_start_date:
    type: string
    nullable: true
  engagement_end_date:
    type: string
    nullable: true
  archived:
    type: boolean
    default: false
  archived_at:
    type: string
    nullable: true
  external_id:
    type: string
    nullable: true
  vulnerability_metrics:
    type: string
    nullable: true
    enum:
    - CVSS
    - OWASP_RR
required:
- created_at
- created_by_uid
- name
