type: object
properties:
  id:
    type: integer
    nullable: true
  name:
    type: string
  client_id:
    type: string
  last_boot_at:
    type: string
    nullable: true
  last_ping_at:
    type: string
    nullable: true
  active:
    type: boolean
    default: false
  version:
    type: string
    nullable: true
  hostname:
    type: string
    nullable: true
  arch:
    type: string
    nullable: true
  cpu:
    type: string
    nullable: true
  memory:
    type: string
    nullable: true
  os:
    type: string
    nullable: true
  ip:
    type: string
    nullable: true
  listen_addr:
    type: string
    nullable: true
required:
- name
- client_id
