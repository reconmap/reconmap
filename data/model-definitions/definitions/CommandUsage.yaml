type: object
properties:
  id:
    type: integer
    nullable: true
  command_id:
    type: integer
  created_by_uid:
    type: integer
  created_at:
    type: string
  updated_at:
    type: string
    nullable: true
  name:
    type: string
    nullable: true
  description:
    type: string
    nullable: true
  tags:
    nullable: true
  executable_path:
    type: string
    nullable: true
  docker_image:
    type: string
    nullable: true
  arguments:
    type: string
    nullable: true
  output_capturing_mode:
    type: string
    enum:
    - none
    - stdout
    - file
    default: none
  output_filename:
    type: string
    nullable: true
  output_parser:
    type: string
    nullable: true
required:
- command_id
- created_by_uid
- created_at
