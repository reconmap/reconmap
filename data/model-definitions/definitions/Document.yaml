type: object
properties:
  id:
    type: integer
    nullable: true
  created_at:
    type: string
  updated_at:
    type: string
    nullable: true
  created_by_uid:
    type: integer
  parent_type:
    type: string
    enum:
    - library
    - project
    - vulnerability
  parent_id:
    type: integer
    nullable: true
  visibility:
    type: string
    enum:
    - private
    - public
    default: private
  title:
    type: string
    nullable: true
  content:
    type: string
required:
- created_at
- created_by_uid
- parent_type
- content
