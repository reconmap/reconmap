type: object
properties:
  id:
    type: integer
    nullable: true
  created_at:
    type: string
  updated_at:
    type: string
    nullable: true
  last_login_ts:
    type: string
    nullable: true
  subject_id:
    type: string
  active:
    type: boolean
    default: true
  mfa_enabled:
    type: boolean
    default: false
  first_name:
    type: string
  last_name:
    type: string
  full_name:
    type: string
    nullable: true
    default: ''
  short_bio:
    type: string
    nullable: true
  username:
    type: string
  email:
    type: string
  timezone:
    type: string
  preferences:
    nullable: true
  role:
    type: string
    nullable: true
    enum:
    - administrator
    - superuser
    - user
    - client
required:
- created_at
- subject_id
- first_name
- last_name
- username
- email
- timezone
