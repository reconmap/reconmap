type: object
properties:
  id:
    type: integer
    nullable: true
  created_at:
    type: string
  created_by_uid:
    type: integer
  parent_type:
    type: string
    enum:
    - project
    - vulnerability
  parent_id:
    type: integer
  visibility:
    type: string
    enum:
    - private
    - public
    default: private
  content:
    type: string
required:
- created_at
- created_by_uid
- parent_type
- parent_id
- content
