type: object
properties:
  id:
    type: integer
    nullable: true
  organisation_id:
    type: integer
  kind:
    type: string
    enum:
    - general
    - technical
    - billing
    default: general
  name:
    type: string
  email:
    type: string
  phone:
    type: string
    nullable: true
  role:
    type: string
    nullable: true
required:
- organisation_id
- name
- email
