name: CLI binaries

on:
  push:
    tags:
      - "*" # triggers only if push new tag version, like `0.8.4` or else
    paths:
      - 'cli/**'
      - '.github/workflows/cli-binaries-build-deploy.yml'      

jobs:
  build-rmap:
    name: Build and release rmap
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: cli/runner

    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # See: https://goreleaser.com/ci/actions/

      - name: Setup Golang
        uses: actions/setup-go@v6
        with:
          go-version: 1.25.3

      - name: Generate sbom
        run: |
          wget -qO- "https://github.com/anchore/syft/releases/download/v1.21.0/syft_1.21.0_linux_amd64.tar.gz" | \
          tar --extract --gzip --file=- syft && \
          chmod +x syft
          ./syft dir:. -o spdx-json > rmap-sbom.spdx.json
          rm syft
        shell: bash

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7.1.0
        with:
          version: latest
          workdir: cli/runner
          args: release --config .goreleaser.yml --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GO_RELEASER_GITHUB_TOKEN }}

  build-reconmapd:
    name: Build and release reconmapd
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: cli/agent

    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # See: https://goreleaser.com/ci/actions/

      - name: Setup Golang
        uses: actions/setup-go@v6
        with:
          go-version: 1.25.3

      - name: Generate sbom
        run: |
          wget -qO- "https://github.com/anchore/syft/releases/download/v1.21.0/syft_1.21.0_linux_amd64.tar.gz" | \
          tar --extract --gzip --file=- syft && \
          chmod +x syft
          ./syft dir:. -o spdx-json > reconmapd-sbom.spdx.json
          rm syft
        shell: bash

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7.1.0
        with:
          version: latest
          workdir: cli/agent
          args: release --config .goreleaser.yml --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GO_RELEASER_GITHUB_TOKEN }}

  push-reconmapd:
    name: Build and release reconmapd
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ github.workspace }}

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.CR_USERNAME }}
          password: ${{ secrets.CR_PAT }}

      - name: Build and push docker image
        run: |
          docker build -t ghcr.io/reconmap/agent:latest -f agent/Dockerfile .
          docker push ghcr.io/reconmap/agent:latest
