name: Docker Keycloak image

on:
  push:
    branches:
      - main
    paths:
      - 'infra/docker/keycloak/**'
      - '.github/workflows/docker-keycloak-build-push.yml'

jobs:
  default:
    name: Build and push
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: infra/docker/keycloak    

    steps:
      - uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.CR_USERNAME }}
          password: ${{ secrets.CR_PAT }}

      - name: Build image
        run: make image-build

      - name: Push image
        run: make image-push
