apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: web-client
  name: web-client
  namespace: nonprod
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: web-client
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.service: web-client
    spec:
      containers:
        - image: ghcr.io/reconmap/web-client:latest
          name: rmap-web-client
          ports:
            - containerPort: 5500
              protocol: TCP
          volumeMounts:
            - mountPath: /usr/share/nginx/html/config.json
              name: web-client-cm0
              readOnly: true
              subPath: config.json
      restartPolicy: Always
      volumes:
        - configMap:
            items:
              - key: config-ui.json
                path: config.json
            name: web-client-cm0
          name: web-client-cm0
