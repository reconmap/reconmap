apiVersion: v1
kind: Service
metadata:
  name: {{ include "reconmap-dashboard.fullname" . }}
  labels:
    {{- include "reconmap-dashboard.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "reconmap-dashboard.selectorLabels" . | nindent 4 }}
  ports:
    - name: "5500"
      port: {{ .Values.service.port }}
      targetPort: 5500
