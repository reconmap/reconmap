apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "reconmap-dashboard.fullname" . }}
  labels:
    {{- include "reconmap-dashboard.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "reconmap-dashboard.selectorLabels" . | nindent 6 }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "reconmap-dashboard.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 5500
              hostPort: 5500
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config-volume
              mountPath: /usr/share/nginx/html/environment.js
              subPath: environment.js
      restartPolicy: Always
      volumes:
        - name: config-volume
          configMap:
            name: {{ include "reconmap-dashboard.fullname" . }}-configmap
