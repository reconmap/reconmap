{{- if .Values.rabbitmq.enabled -}}
apiVersion: v1
kind: Service
metadata:
  labels:
    {{- include "reconmap.labels" . | nindent 4 }}
    app.kubernetes.io/component: rabbitmq
  name: rabbitmq
  namespace: {{ .Values.global.namespace }}
spec:
  ports:
    - name: "5672"
      port: 5672
      targetPort: 5672
  selector:
    {{- include "reconmap.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: rabbitmq
{{- end }}
