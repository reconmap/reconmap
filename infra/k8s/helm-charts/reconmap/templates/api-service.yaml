{{- if .Values.api.enabled -}}
apiVersion: v1
kind: Service
metadata:
  labels:
    {{- include "reconmap.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
  name: ngapi
  namespace: {{ .Values.global.namespace }}
spec:
  ports:
    - name: "5253"
      port: 5253
      targetPort: 5253
  selector:
    {{- include "reconmap.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
{{- end }}
