apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: mysql
  name: mysql
  namespace: nonprod
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: mysql
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.service: mysql
    spec:
      containers:
        - env:
            - name: MYSQL_ROOT_PASSWORD
              value: reconmuppet
          image: ghcr.io/reconmap/rest-api-db:latest
          livenessProbe:
            exec:
              command:
                - mysql -h 127.0.0.1 -u root --password=$MYSQL_ROOT_PASSWORD mysql -e 'SELECT 1;'
            failureThreshold: 5
            periodSeconds: 5
            timeoutSeconds: 10
          name: rmap-mysql
          ports:
            - containerPort: 3306
              protocol: TCP
          volumeMounts:
            - mountPath: /var/lib/mysql
              name: mysql-varlib
      restartPolicy: Always
      volumes:
        - name: mysql-varlib
          persistentVolumeClaim:
            claimName: mysql-varlib
