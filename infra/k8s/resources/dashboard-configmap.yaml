    {
        "$schema": "https://raw.githubusercontent.com/reconmap/reconmap/refs/heads/main/apps/dashboard/config-schema.json",
        "contextPath": "",
        "logoUrl": "/logo-name.png",
        "reconmapApiUrl": "http://localhost:5510/api",
        "notificationsServiceUrl": "ws://localhost:5510/api",
        "keycloak": {
            "url": "http://localhost:8080",
            "realm": "reconmap",
            "clientId": "dashboard"
        }
