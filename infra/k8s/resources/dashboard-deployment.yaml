apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: dashboard
  name: dashboard
  namespace: nonprod
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dashboard
    spec:
      containers:
        - image: ghcr.io/reconmap/web-client:latest
          name: rmap-dashboard
          ports:
            - containerPort: 5500
              protocol: TCP
          volumeMounts:
            - mountPath: /usr/share/nginx/html/config.json
              name: dashboard-config
              subPath: config.json
      restartPolicy: Always
      volumes:
        - configMap:
            items:
              - key: config-ui.json
                path: config.json
            name: dashboard-configmap
          name: dashboard-config
